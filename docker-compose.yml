services:
  app:
    build: .
    command: gunicorn -b 0.0.0.0:8000 run:app
    restart: always
    environment:
      - MONGO_URI=mongodb://mongodb:27017/ofertas_saas
    depends_on:
      - mongodb

  mongodb:
    image: mongo:6
    restart: always
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data: