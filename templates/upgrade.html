{% extends "base.html" %}
{% block content %}

<div class="card">
    <h2>💎 Escolha seu Plano</h2>

    <div style="display:flex; gap:20px; margin-top:20px;">

        <div class="plan">
            <h3>Free</h3>
            <p>3 envios por dia</p>
            <h4>R$ 0</h4>
        </div>

        <div class="plan">
            <h3>Premium</h3>
            <p>Envios ilimitados</p>
            <h4>R$ 29,90 / mês</h4>
            <form method="POST" action="/create-checkout">
                <input type="hidden" name="plano" value="premium">
                <button class="btn-primary">Assinar Premium</button>
            </form>
        </div>

        <div class="plan">
            <h3>Vitalício</h3>
            <p>Acesso permanente</p>
            <h4>R$ 297</h4>
            <form method="POST" action="/create-checkout">
                <input type="hidden" name="plano" value="vitalicio">
                <button class="btn-primary">Comprar Vitalício</button>
            </form>
        </div>

    </div>
</div>

<style>
.plan {
    background:#1f1f2e;
    padding:20px;
    border-radius:12px;
    color:white;
    width:250px;
}
</style>

{% endblock %}
